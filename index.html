<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="display" id="display">
        <div class="result">
          <h1>0.0</h1>
        </div>
      </div>
      <div class="buttons">
        <div id="btns" class="style-btns">
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>+</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>-</button>
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>*</button>
          <button>0</button>
          <button>00</button>
          <button>|x|</button>
          <button>±</button>
          <button>.</button>
          <button>&radic;</button>
          <button>x&sup2;</button>
          <button>/</button>
          <button>%</button>
          <button id="ac">AC</button>
          <button id="del">Del</button>
          <button>=</button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
